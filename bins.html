<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresh Snacks - Log My Snacks</title>
  <link rel="stylesheet" href="styles.css?v=20260717-gallery-redesign" />
  <script src="js/qrcode.js?v=20260716-nav-qr-export" defer></script>
  <script src="js/nav-qr.js?v=20260716-nav-qr-modal" defer></script>
</head>
<body>
  <main class="page">
    <header>
      <div class="header-row">
        <div class="header-lead">
          <button class="hamburger" id="nav-toggle" aria-label="Open menu">&#9776;</button>
          <a href="index.html" class="brand-logo-link" aria-label="Fresh Snacks home"><img class="brand-logo" src="banner-logo.png" alt="Fresh Snacks" /></a>
          <div>
            <h1>Snack now, pay later</h1>
            <p><strong>Took a snack?</strong></p>
            <p class="muted-small">Take a snack. We'll remember you.</p>
          </div>
        </div>
      </div>
    </header>

    <div id="firebase-auth-prompt"></div>

    <section class="card section-card">
      <h2>Snack baskets</h2>
      <div class="note" id="device-note">Connecting this browser...</div>
      <div class="bin-grid" id="bins">
        <p>Loading snacks...</p>
      </div>

      <div class="bin-total">
        <div>
          <div class="stat-label">Adding to tab</div>
          <div class="amount" id="total">J$0</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button id="reset">Clear</button>
          <button class="primary" id="submit" disabled>Add to my tab</button>
        </div>
      </div>
      <div class="status" id="submit-status"></div>
    </section>

    <footer>Your snack activity is added to your tab right away.</footer>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-store.js?v=20260723-tab-state"></script>
  <script src="js/nav.js?v=20260723-tab-state"></script>
  <script>
    let DATA = null;
    const picked = new Map();

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    function status(id, msg, ok) {
      const el = $(id);
      el.textContent = msg;
      el.className = "status " + (ok ? "ok" : "err");
    }

    function total() {
      let t = 0;
      for (const [id, qty] of picked) {
        const s = FS.snackById(DATA, id);
        if (s) t += s.price * qty;
      }
      return t;
    }

    function sync() {
      const cur = DATA.profile.currency;
      for (const s of DATA.catalog) {
        const el = document.querySelector(`.qty[data-id="${s.id}"]`);
        if (el) el.textContent = picked.get(s.id) || 0;
      }
      $("total").textContent = FS.money(total(), cur);
      $("submit").disabled = total() === 0;
    }

    function renderBins() {
      if (!DATA.catalog.length) {
        $("bins").innerHTML = `<p class="status err">No active snacks are set up yet.</p>`;
        return;
      }
      $("bins").innerHTML = DATA.catalog.map((s) => `
        <div class="bin-card">
          <div class="bin-photo">${s.photo
            ? `<img src="${esc(s.photo)}" alt="${esc(s.name)}" loading="lazy" />`
            : `<span class="bin-placeholder" aria-hidden="true">&#127850;</span>`}</div>
          <div class="bin-body">
            <div class="bin-name">${esc(s.name)}</div>
            <div class="bin-price">${FS.money(s.price, DATA.profile.currency)} each</div>
            ${s.factsId ? `<div class="bin-facts"><a href="#" data-facts="${esc(FS.factsPath(s.factsId))}" data-name="${esc(s.name)}">Nutrition facts</a></div>` : ""}
            <div class="stepper" role="group" aria-label="${esc(s.name)} quantity">
              <button data-id="${esc(s.id)}" data-d="-1" aria-label="One less ${esc(s.name)}">&minus;</button>
              <span class="qty" data-id="${esc(s.id)}">0</span>
              <button data-id="${esc(s.id)}" data-d="1" aria-label="One more ${esc(s.name)}">+</button>
            </div>
          </div>
        </div>`).join("");
      sync();
    }

    $("bins").addEventListener("click", (ev) => {
      const facts = ev.target.closest("a[data-facts]");
      if (facts) {
        ev.preventDefault();
        FS.showFacts(facts.dataset.facts, facts.dataset.name);
        return;
      }
      const btn = ev.target.closest("button[data-id]");
      if (!btn) return;
      const id = btn.dataset.id;
      const next = Math.max(0, (picked.get(id) || 0) + Number(btn.dataset.d));
      if (next === 0) picked.delete(id); else picked.set(id, next);
      sync();
    });

    $("reset").onclick = () => { picked.clear(); sync(); };

    $("submit").onclick = async () => {
      const cur = DATA.profile.currency;
      const items = [...picked.entries()].map(([id, qty]) => {
        const snack = FS.snackById(DATA, id);
        return { snack, qty };
      }).filter((x) => x.snack);
      if (!items.length) return;

      const summary = items.map((x) => `${x.qty}x ${x.snack.name}`).join(", ");
      if (!confirm(`Add ${summary} (${FS.money(total(), cur)}) to your tab?`)) return;

      $("submit").disabled = true;
      status("submit-status", "Adding to your tab...", true);
      try {
        await FS.addTransaction(items);
        picked.clear();
        sync();
        status("submit-status", `Added ${summary} to your tab.`, true);
      } catch (e) {
        status("submit-status", e.message, false);
      } finally {
        sync();
      }
    };

    FS.loadData()
      .then((d) => {
        DATA = d;
        $("device-note").textContent = FS.currentDevice?.deviceId
          ? `Connected as ${FS.currentDevice.deviceId}.`
          : "Choose your snacks below. A tab is created only when you submit.";
        renderBins();
      })
      .catch((e) => {
        if (String(e.message).includes("Firebase is not configured")) {
          FS.showFirebaseSetupPrompt("firebase-auth-prompt", e.message);
          $("device-note").textContent = "Firebase setup is required before snack logging.";
          $("bins").innerHTML = "";
        } else {
          $("device-note").className = "status err";
          $("device-note").textContent = e.message;
          $("bins").innerHTML = `<p class="status err">Could not load snacks.</p>`;
        }
      });
  </script>
</body>
</html>
